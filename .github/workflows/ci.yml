name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync
      - run: uv run ruff check engram/ tests/
      - run: uv run ruff format --check engram/ tests/
      - run: uv run mypy engram/ --ignore-missing-imports
      - run: uv run pytest tests/ -v
